services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.16
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "4"
      - --memory
      - "8G"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${CLAWWORKER_DB_USER:-clawworker}
      POSTGRES_PASSWORD: ${CLAWWORKER_DB_PASSWORD:-clawworker}
      POSTGRES_DB: ${CLAWWORKER_DB_NAME:-clawworker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLAWWORKER_DB_USER:-clawworker} -d ${CLAWWORKER_DB_NAME:-clawworker}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
